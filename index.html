<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Livros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="app">
        <header>
            <div>
                <h1 class="header__title">Minha Lista de Livros</h1>
                <h2 class="header__subtitle">Organize e acompanhe suas leituras</h2>
            </div>
            <button class="button" data-bs-toggle="modal" data-bs-target="#adicionarModal">+ Adicionar Livro</button>

            <!-- Modal Adicionar Livro -->
            <div class="modal fade" id="adicionarModal" tabindex="-1" aria-labelledby="adicionarModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content border-0 rounded-4">
                        <div class="modal-header rounded-top-4">
                            <h2 class="modal-title fs-5" id="adicionarModalLabel">Adicionar Livro</h2>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <form id="livroFormAdicionar">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="nome" class="form-label">Título *</label>
                                    <input type="text" class="form-control" id="nome" name="nome" required>
                                </div>
                                <div class="mb-3">
                                    <label for="autor" class="form-label">Autor *</label>
                                    <input type="text" class="form-control" id="autor" name="autor" required>
                                </div>
                                <div class="mb-3">
                                    <label for="categoria" class="form-label">Gênero</label>
                                    <input type="text" class="form-control" id="categoria" name="categoria"
                                        placeholder="Ex: Ficção, Romance, Fantasia...">
                                </div>
                                <div class="mb-3">
                                    <fieldset class="rating_radios">
                                        <legend class="form-label">Avaliação</legend>
                                        <div class="d-flex gap-2">
                                            <input class="form-check-input d-none" type="radio" name="rating"
                                                id="adicionar-rating1" value="1">
                                            <label class="form-check-label" for="adicionar-rating1">
                                                <i class="fa-regular fa-star livro__star"></i>
                                            </label>
                                            <input class="form-check-input d-none" type="radio" name="rating"
                                                id="adicionar-rating2" value="2">
                                            <label class="form-check-label" for="adicionar-rating2">
                                                <i class="fa-regular fa-star livro__star"></i>
                                            </label>
                                            <input class="form-check-input d-none" type="radio" name="rating"
                                                id="adicionar-rating3" value="3">
                                            <label class="form-check-label" for="adicionar-rating3">
                                                <i class="fa-regular fa-star livro__star"></i>
                                            </label>
                                            <input class="form-check-input d-none" type="radio" name="rating"
                                                id="adicionar-rating4" value="4">
                                            <label class="form-check-label" for="adicionar-rating4">
                                                <i class="fa-regular fa-star livro__star"></i>
                                            </label>
                                            <input class="form-check-input d-none" type="radio" name="rating"
                                                id="adicionar-rating5" value="5">
                                            <label class="form-check-label" for="adicionar-rating5">
                                                <i class="fa-regular fa-star livro__star"></i>
                                            </label>
                                        </div>
                                    </fieldset>
                                </div>
                                <label for="status" class="form-label">Status</label>
                                <select class="form-select mb-3" aria-label="Select de Status de leitura" id="status"
                                    name="status">
                                    <option value="Quero Ler" selected>Quero Ler</option>
                                    <option value="Lendo">Lendo</option>
                                    <option value="Finalizado">Finalizado</option>
                                    <option value="Abandonado">Abandonado</option>
                                </select>
                                <div class="d-flex gap-3">
                                    <div class="mb-3 w-50">
                                        <label for="data_inicio" class="form-label">Data de Início</label>
                                        <input type="date" class="form-control" id="data_inicio" name="data_inicio">
                                    </div>
                                    <div class="mb-3 w-50">
                                        <label for="data_fim" class="form-label">Data de Fim</label>
                                        <input type="date" class="form-control" id="data_fim" name="data_fim">
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="button button--outline px-5" data-bs-dismiss="modal">Cancelar</button>
                                <button class="button px-5" type="submit">Salvar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </header>

        <section class="livros-filtros">
            <nav class="navbar navbar-expand-lg mb-3">
                <div class="container-fluid p-0">
                    <ul class="navbar-nav livros-filtros__lista">
                        <li class="nav-item livros-filtros__item">
                            <button class="nav-link livros-filtros__link active d-flex align-items-center" data-status="">
                                <i class="fa-solid fa-book me-2"></i>Todos os Livros
                            </button>
                        </li>
                        <li class="nav-item livros-filtros__item">
                            <button class="nav-link livros-filtros__link d-flex align-items-center" data-status="Quero Ler">
                                <i class="fa-solid fa-bookmark me-2"></i>Quero Ler
                            </button>
                        </li>
                        <li class="nav-item livros-filtros__item">
                            <button class="nav-link livros-filtros__link d-flex align-items-center" data-status="Lendo">
                                <i class="fa-solid fa-book-open me-2"></i>Lendo
                            </button>
                        </li>
                        <li class="nav-item livros-filtros__item">
                            <button class="nav-link livros-filtros__link d-flex align-items-center" data-status="Finalizado">
                                <i class="fa-solid fa-circle-check me-2"></i>Finalizado
                            </button>
                        </li>
                        <li class="nav-item livros-filtros__item">
                            <button class="nav-link livros-filtros__link d-flex align-items-center" data-status="Abandonado">
                                <i class="fa-solid fa-ban me-2"></i>Abandonado
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>
        </section>

        <section class="livros">
            <!-- Modal Editar Livro -->
            <div class="modal fade" id="editarModal" tabindex="-1" aria-labelledby="editarModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content border-0 rounded-4">
                        <div class="modal-header rounded-top-4">
                            <h2 class="modal-title fs-5" id="editarModalLabel">Editar Livro</h2>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <form id="livroFormEditar">
                            <input type="hidden" class="form-control" id="id" name="id" required>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="nome" class="form-label">Título *</label>
                                    <input type="text" class="form-control" id="nome" name="nome" required>
                                </div>
                                <div class="mb-3">
                                    <label for="autor" class="form-label">Autor *</label>
                                    <input type="text" class="form-control" id="autor" name="autor" required>
                                </div>
                                <div class="mb-3">
                                    <label for="categoria" class="form-label">Gênero</label>
                                    <input type="text" class="form-control" id="categoria" name="categoria"
                                        placeholder="Ex: Ficção, Romance, Fantasia...">
                                </div>
                                <div class="mb-3">
                                    <fieldset class="rating_radios">
                                        <legend class="form-label">Avaliação</legend>
                                        <div class="d-flex gap-2">
                                            <input class="form-check-input d-none" type="radio" name="rating"
                                                id="editar-rating1" value="1">
                                            <label class="form-check-label" for="editar-rating1">
                                                <i class="fa-regular fa-star livro__star"></i>
                                            </label>
                                            <input class="form-check-input d-none" type="radio" name="rating"
                                                id="editar-rating2" value="2">
                                            <label class="form-check-label" for="editar-rating2">
                                                <i class="fa-regular fa-star livro__star"></i>
                                            </label>
                                            <input class="form-check-input d-none" type="radio" name="rating"
                                                id="editar-rating3" value="3">
                                            <label class="form-check-label" for="editar-rating3">
                                                <i class="fa-regular fa-star livro__star"></i>
                                            </label>
                                            <input class="form-check-input d-none" type="radio" name="rating"
                                                id="editar-rating4" value="4">
                                            <label class="form-check-label" for="editar-rating4">
                                                <i class="fa-regular fa-star livro__star"></i>
                                            </label>
                                            <input class="form-check-input d-none" type="radio" name="rating"
                                                id="editar-rating5" value="5">
                                            <label class="form-check-label" for="editar-rating5">
                                                <i class="fa-regular fa-star livro__star"></i>
                                            </label>
                                        </div>
                                    </fieldset>
                                </div>
                                <label for="status" class="form-label">Status</label>
                                <select class="form-select mb-3" aria-label="Select de Status de leitura" id="status"
                                    name="status">
                                    <option value="Quero Ler" selected>Quero Ler</option>
                                    <option value="Lendo">Lendo</option>
                                    <option value="Finalizado">Finalizado</option>
                                    <option value="Abandonado">Abandonado</option>
                                </select>
                                <div class="d-flex gap-3">
                                    <div class="mb-3 w-50">
                                        <label for="data_inicio" class="form-label">Data de Início</label>
                                        <input type="date" class="form-control" id="data_inicio" name="data_inicio">
                                    </div>
                                    <div class="mb-3 w-50">
                                        <label for="data_fim" class="form-label">Data de Fim</label>
                                        <input type="date" class="form-control" id="data_fim" name="data_fim">
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="button button--outline px-5" data-bs-dismiss="modal">Cancelar</button>
                                <button class="button px-5" type="submit">Salvar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <!-- Modal Trecho Livro -->
            <div class="modal fade" id="trechoModal" tabindex="-1" aria-labelledby="trechoModalLabel"
                aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content border-0 rounded-4">
                        <div class="modal-header rounded-top-4">
                            <h2 class="modal-title fs-5" id="trechoModalLabel">Trechos do Livro</h2>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <section class="trechos mt-3">
                            <ul class="trechos__lista mb-0 ps-0 mx-3">
                            </ul>
                        </section>
                        <form id="livroFormTrecho">
                            <input type="hidden" class="form-control" id="livro_id" name="livro_id" required>
                            <div class="modal-body">
                                <textarea class="form-control mb-3" id="texto" name="texto" rows="3" placeholder="Registre suas impressões, páginas marcantes, citações e reflexões conforme avança na leitura." required></textarea>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="button button--outline px-5" data-bs-dismiss="modal">Cancelar</button>
                                <button class="button px-5" type="submit">Salvar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <ul class="livros__lista">
            </ul>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/livros.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
    </script>
</body>

</html>
